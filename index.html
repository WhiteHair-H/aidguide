  const filteredCats = searchQuery
    ? firstAidData.categories.filter((c) =>
        c.label.includes(searchQuery) ||
        firstAidData.guides[c.id].title.includes(searchQuery)
      )
    : firstAidData.categories;

  useEffect(() => {
    setActiveStep(null);
  }, [selected]);

  const sevColor = (sev) => {
    if (sev === "위험") return "#FF3B30";
    if (sev === "주의") return "#FF9500";
    return "#34C759";
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: "#0a0a0f",
      fontFamily: "'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif",
      color: "#f0f0f0",
      position: "relative",
      overflow: "hidden",
    }}>
      {/* Background grid */}
      <div style={{
        position: "fixed", inset: 0, zIndex: 0,
        backgroundImage: `linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px)`,
        backgroundSize: "40px 40px",
        pointerEvents: "none",
      }} />

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .cat-card {
          background: rgba(255,255,255,0.04);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 16px;
          padding: 20px 16px;
          cursor: pointer;
          transition: all 0.2s ease;
          display: flex; flex-direction: column; align-items: center; gap: 10px;
          position: relative; overflow: hidden;
        }
        .cat-card:hover {
          transform: translateY(-3px);
          border-color: rgba(255,255,255,0.2);
          background: rgba(255,255,255,0.07);
        }
        .cat-card::before {
          content: '';
          position: absolute; bottom: 0; left: 0; right: 0;
          height: 3px;
          background: var(--accent);
          transform: scaleX(0);
          transition: transform 0.2s;
          transform-origin: left;
        }
        .cat-card:hover::before { transform: scaleX(1); }
        .step-item {
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 12px;
          overflow: hidden;
          margin-bottom: 10px;
          transition: border-color 0.2s;
        }
        .step-item:hover { border-color: rgba(255,255,255,0.2); }
        .step-header {
          display: flex; align-items: center; gap: 14px;
          padding: 16px 18px; cursor: pointer;
          background: rgba(255,255,255,0.03);
          transition: background 0.2s;
        }
        .step-header:hover { background: rgba(255,255,255,0.06); }
        .step-body {
          padding: 0 18px 16px 18px;
          border-top: 1px solid rgba(255,255,255,0.06);
          animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
          from { opacity: 0; transform: translateY(-8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .emer-btn {
          display: inline-flex; align-items: center; gap: 8px;
          background: rgba(255,59,48,0.15);
          border: 1px solid rgba(255,59,48,0.4);
          color: #FF6B6B;
          padding: 10px 20px; border-radius: 50px;
          font-weight: 700; font-size: 15px;
          cursor: pointer;
          transition: all 0.2s;
          text-decoration: none;
        }
        .emer-btn:hover {
          background: rgba(255,59,48,0.25);
          border-color: rgba(255,59,48,0.6);
          transform: scale(1.03);
        }
        .back-btn {
          display: inline-flex; align-items: center; gap: 6px;
          background: rgba(255,255,255,0.07);
          border: 1px solid rgba(255,255,255,0.12);
          color: #ccc;
          padding: 8px 16px; border-radius: 8px;
          font-size: 14px; cursor: pointer;
          transition: all 0.2s; margin-bottom: 24px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .search-input {
          width: 100%; background: rgba(255,255,255,0.06);
          border: 1px solid rgba(255,255,255,0.1);
          border-radius: 12px; padding: 12px 18px;
          color: #f0f0f0; font-size: 15px;
          outline: none; font-family: inherit;
          transition: border-color 0.2s;
        }
        .search-input:focus { border-color: rgba(255,255,255,0.3); }
        .search-input::placeholder { color: #555; }
        .tip-item {
          display: flex; align-items: flex-start; gap: 10px;
          padding: 10px 0;
          border-bottom: 1px solid rgba(255,255,255,0.05);
          font-size: 14px; color: #aaa; line-height: 1.6;
        }
        .tip-item:last-child { border-bottom: none; }
        .pulse {
          animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
      `}</style>

      <div style={{ position: "relative", zIndex: 1, maxWidth: 720, margin: "0 auto", padding: "0 16px 60px" }}>

        {/* Header */}
        <div style={{ padding: "32px 0 28px", borderBottom: "1px solid rgba(255,255,255,0.07)", marginBottom: 28 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 3, color: "#FF3B30", fontWeight: 700, marginBottom: 6, textTransform: "uppercase" }}>
                🚨 응급 가이드
              </div>
              <h1 style={{ fontSize: 28, fontWeight: 900, letterSpacing: -1, lineHeight: 1.2 }}>
                응급처치<br />
                <span style={{ color: "#FF3B30" }}>빠른 가이드</span>
              </h1>
            </div>
            <a href="tel:119" className="emer-btn pulse">
              📞 119 신고
            </a>
          </div>
          <p style={{ color: "#666", fontSize: 13, marginTop: 14, lineHeight: 1.7 }}>
            응급 상황 발생 시 신속하게 올바른 처치를 제공하세요.<br />
            이 가이드는 전문 의료의 대체재가 아닙니다.
          </p>
        </div>

        {!selected ? (
          /* Category Grid */
          <>
            <div style={{ marginBottom: 24 }}>
              <input
                className="search-input"
                placeholder="🔍  증상 또는 상황 검색..."
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
              />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 12 }}>
              {filteredCats.map((cat) => (
                <div
                  key={cat.id}
                  className="cat-card"
                  style={{ "--accent": cat.color }}
                  onClick={() => setSelected(cat.id)}
                >
                  <div style={{ fontSize: 36 }}>{cat.icon}</div>
                  <div style={{ fontSize: 14, fontWeight: 700, textAlign: "center", lineHeight: 1.4 }}>{cat.label}</div>
                  <div style={{
                    fontSize: 11,
                    border: `1px solid ${cat.color}33`,
                    background: `${cat.color}11`,
                    color: cat.color,
                    padding: "2px 8px", borderRadius: 20, fontWeight: 600
                  }}>
                    {firstAidData.guides[cat.id].severity}
                  </div>
                </div>
              ))}
            </div>

            {filteredCats.length === 0 && (
              <div style={{ textAlign: "center", padding: "60px 0", color: "#444" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>🔍</div>
                <div>검색 결과가 없습니다</div>
              </div>
            )}

            {/* Quick numbers */}
            <div style={{
              marginTop: 40,
              background: "rgba(255,59,48,0.07)",
              border: "1px solid rgba(255,59,48,0.2)",
              borderRadius: 16, padding: "20px 24px"
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#FF6B6B", marginBottom: 14, letterSpacing: 1 }}>
                📞 긴급 연락처
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(120px, 1fr))", gap: 10 }}>
                {[
                  { num: "119", label: "소방·구급" },
                  { num: "112", label: "경찰" },
                  { num: "1339", label: "응급의료정보" },
                  { num: "1588-1339", label: "중독정보센터" },
                ].map(({ num, label }) => (
                  <a key={num} href={`tel:${num}`} style={{
                    textDecoration: "none",
                    background: "rgba(255,255,255,0.05)",
                    border: "1px solid rgba(255,255,255,0.1)",
                    borderRadius: 10, padding: "12px",
                    textAlign: "center", cursor: "pointer",
                    transition: "all 0.2s",
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.1)"}
                  onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.05)"}
                  >
                    <div style={{ fontSize: 20, fontWeight: 900, color: "#FF3B30" }}>{num}</div>
                    <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>{label}</div>
                  </a>
                ))}
              </div>
            </div>
          </>
        ) : (
          /* Detail View */
          <>
            <button className="back-btn" onClick={() => { setSelected(null); setSearchQuery(""); }}>
              ← 목록으로
            </button>

            {/* Title bar */}
            <div style={{
              background: `linear-gradient(135deg, ${cat.color}22, ${cat.color}08)`,
              border: `1px solid ${cat.color}33`,
              borderRadius: 20, padding: "24px",
              marginBottom: 24,
              display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap"
            }}>
              <div style={{ fontSize: 52 }}>{cat.icon}</div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>
                  <span style={{
                    fontSize: 12, fontWeight: 700, padding: "3px 10px",
                    borderRadius: 20, background: `${sevColor(guide.severity)}22`,
                    border: `1px solid ${sevColor(guide.severity)}44`,
                    color: sevColor(guide.severity)
                  }}>{guide.severity}</span>
                </div>
                <h2 style={{ fontSize: 22, fontWeight: 900, letterSpacing: -0.5, marginBottom: 8 }}>{guide.title}</h2>
                <p style={{ color: "#aaa", fontSize: 14, lineHeight: 1.6 }}>{guide.overview}</p>
              </div>
              <a href={`tel:${guide.emergency.split(" / ")[0]}`} className="emer-btn">
                📞 {guide.emergency}
              </a>
            </div>

            {/* Steps */}
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 12, letterSpacing: 2, color: "#555", fontWeight: 700, marginBottom: 14, textTransform: "uppercase" }}>
                처치 순서
              </div>
              {guide.steps.map((step) => {
                const isOpen = activeStep === step.num;
                return (
                  <div key={step.num} className="step-item">
                    <div
                      className="step-header"
                      onClick={() => setActiveStep(isOpen ? null : step.num)}
                    >
                      <div style={{
                        width: 32, height: 32, borderRadius: "50%",
                        background: isOpen ? cat.color : "rgba(255,255,255,0.1)",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 14, fontWeight: 900, flexShrink: 0,
                        color: isOpen ? "#fff" : "#888",
                        transition: "all 0.2s",
                      }}>
                        {step.num}
                      </div>
                      <span style={{ flex: 1, fontWeight: 600, fontSize: 15 }}>{step.title}</span>
                      <span style={{ color: "#555", fontSize: 18, transition: "transform 0.2s", transform: isOpen ? "rotate(180deg)" : "none" }}>
                        ↓
                      </span>
                    </div>
                    {isOpen && (
                      <div className="step-body">
                        <p style={{ color: "#ccc", fontSize: 14, lineHeight: 1.8, marginTop: 14 }}>{step.desc}</p>
                        {step.warning && (
                          <div style={{
                            marginTop: 12, padding: "10px 14px",
                            background: "rgba(255,149,0,0.1)",
                            border: "1px solid rgba(255,149,0,0.25)",
                            borderRadius: 8,
                            fontSize: 13, color: "#FFB347", lineHeight: 1.6
                          }}>
                            ⚠️ {step.warning}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Tips */}
            <div style={{
              background: "rgba(255,255,255,0.03)",
              border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: 16, padding: "20px 24px", marginTop: 24
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#888", marginBottom: 12, letterSpacing: 1, textTransform: "uppercase" }}>
                💡 알아두세요
              </div>
              {guide.tips.map((tip, i) => (
                <div key={i} className="tip-item">
                  <span style={{ color: cat.color, marginTop: 2 }}>✓</span>
                  <span>{tip}</span>
                </div>
              ))}
            </div>
          </>
        )}

        {/* Footer */}
        <div style={{ marginTop: 48, textAlign: "center", color: "#333", fontSize: 12, lineHeight: 1.8 }}>
          <div>이 가이드는 참고용이며 전문 의료 기관의 진료를 대체하지 않습니다.</div>
          <div>생명을 위협하는 응급 상황에서는 반드시 119에 신고하세요.</div>
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(<FirstAidApp />);
  </script>
</body>
</html>
